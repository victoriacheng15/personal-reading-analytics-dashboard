name: Go Lint & Test Checking

on:
  pull_request:
    branches: [main]
    paths: [cmd/**, internal/**]
  push:
    branches: [main]
    paths: [cmd/**, internal/**]

env:
  go-version: '1.25'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}

      - name: Run tests
        run: make go-test

      - name: Check gofmt
        run: make go-check

      - name: Run go vet
        run: go vet ./cmd/... ./internal/...

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}

      - name: Run tests
        run: make go-test
